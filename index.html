<html>

<head>
    <script async data-id="101460922" src="//static.getclicky.com/js"></script>
    <meta name="description" content="Sleek modern alg trainers for a variety of algsets and puzzles. Installable as a PWA and customizable with your own color scheme.">
    <meta name="keywords" content="3x3, OH, One-Handed, 2x2, Megaminx, Pyraminx, Skewb, FTO, Face Turning Octahedron, Octaminx, PLL, OLL, CMLL, EG, TCLL, LS, FH, L4E, NS2, EG2, TCP">

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" type="text/css" href="style/main.css">
    <link rel="manifest" href="manifest.json" />
    <title>ALLG Trainer</title>
    <script>
        var selectedAlgSets = {};
        const registerServiceWorker = async () => {
			if ("serviceWorker" in navigator) {
				try {
					const registration = await navigator.serviceWorker.register("/Alg-Trainers/serviceworker.js", {
						scope: "/Alg-Trainers/",
					});
					if (registration.installing) {
						console.log("Service worker installing");
					} else if (registration.waiting) {
						console.log("Service worker installed");
					} else if (registration.active) {
						console.log("Service worker active");
					}
				} catch (error) {
					console.error(`Registration failed with ${error}`);
				}
			}
		};
		registerServiceWorker();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap"

<body id="bodyid" class="niceBody colFlex" style="background-color: var(--backgroundDarker);">
    <div class="colFlex pad">
        <h3>Welcome to ALLG-Trainer</h3>
    </div>
    <div id="algtrainer-selections" class="rowFlex pad"></div>
    <span class="version" id="versionLabel" style="text-align: center;"></span>
</body>
<script>
    function renderTrainerSelections() {
        const container = document.getElementById("algtrainer-selections");
        if (!container) {
            return;
        }

        fetch("index.json")
            .then((response) => {
                if (!response.ok) {
                    throw new Error("Failed to load index.json");
                }
                return response.json();
            })
            .then((data) => {
                container.innerHTML = "";
                Object.entries(data).forEach(([puzzleName, entries]) => {
                    const card = document.createElement("div");
                    card.className = "borderedContainer pad colFlex";

                    const header = document.createElement("div");
                    header.className = "puzzle-header borderedContainer pad";
                    header.style.backgroundColor = "var(--backgroundDarker)";

                    const title = document.createElement("span");
                    title.textContent = puzzleName;
                    header.appendChild(title);

                    const iconPath = entries && entries.length ? `${entries[0].location}/icon.png` : "icon.png";
                    const icon = document.createElement("img");
                    icon.style.height = "1.4em";
                    icon.src = iconPath;
                    header.appendChild(icon);

                    const buttons = document.createElement("div");
                    buttons.className = "rowFlex";

                    (entries || []).forEach((entry) => {
                        const button = document.createElement("span");
                        button.className = "abutton grow";
                        button.onclick = () => {
                            window.location = `${entry.location}/index.html`;
                        };

                        const label = document.createElement("b");
                        label.textContent = entry.name;
                        button.appendChild(label);
                        buttons.appendChild(button);
                    });

                    card.appendChild(header);
                    card.appendChild(buttons);
                    container.appendChild(card);
                });
            })
            .catch((error) => {
                console.error("Failed to render trainer selections", error);
                container.innerHTML = '<div class="borderedContainer pad">Unable to load trainer list.</div>';
            });
    }

    renderTrainerSelections();
    loadSettings();
    applySettings();
    document.getElementById("versionLabel").textContent = `v${APP_VERSION}`;
</script>
</html>
